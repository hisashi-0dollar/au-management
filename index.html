<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>au実績管理</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    body {
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.300.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js"
      }
    }
  </script>
</head>
<body class="bg-[#f2f2f7] text-gray-900 antialiased selection:bg-amber-200">
  <div id="root"></div>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Edit, PieChart, Settings as SettingsIcon, Plus, Trash2, CheckCircle, AlertCircle, Save, X, MessageSquare, ChevronRight, Calendar, User, Clock, BellRing, Square, CheckSquare, ArrowUp, ArrowDown } from 'lucide-react';
    
    import { initializeApp } from "firebase/app";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "firebase/auth";
    import { getFirestore, doc, setDoc, collection, addDoc, updateDoc, onSnapshot, deleteDoc } from "firebase/firestore";
    import { getAnalytics, isSupported } from "firebase/analytics";

    function App() {
      const [user, setUser] = useState(null);
      const [db, setDb] = useState(null);
      const [appId, setAppId] = useState('au-shop-app');
      
      const [tab, setTab] = useState('record'); 
      const [msg, setMsg] = useState({ text: '', type: '' });

      const [settings, setSettings] = useState({ shops: [], staffs: [], products: [], otherStats: [] });
      const [records, setRecords] = useState([]);
      const [shares, setShares] = useState([]);

      const defaultSettings = {
        adminPassword: '0000',
        shops: [],
        staffs: [],
        products: [],
        otherStats: []
      };

      useEffect(() => {
        const id = typeof __app_id !== 'undefined' ? __app_id : 'au-shop-app';
        setAppId(id);
        
        // お客様専用のFirebase設定
        const firebaseConfig = {
          apiKey: "AIzaSyCgcxl420NijkbRL-_XUjj9I6Teub3cAsY",
          authDomain: "au-management-3f874.firebaseapp.com",
          projectId: "au-management-3f874",
          storageBucket: "au-management-3f874.firebasestorage.app",
          messagingSenderId: "739830675936",
          appId: "1:739830675936:web:e0d04e2ff7099fc3329385",
          measurementId: "G-VPTNVG5RGP"
        };
        
        // プレビュー環境(Sandbox)かどうかを判定
        const isSandbox = typeof __firebase_config !== 'undefined' && __firebase_config;
        const config = isSandbox ? JSON.parse(__firebase_config) : firebaseConfig;

        const app = initializeApp(config);
        const auth = getAuth(app);
        const database = getFirestore(app);
        setDb(database);

        // プレビュー環境での404エラーを防ぐため、本番環境の時のみAnalyticsを初期化する
        if (!isSandbox && config.measurementId) {
          isSupported().then((supported) => {
            if (supported) {
              getAnalytics(app);
            }
          }).catch((err) => console.warn("Analytics not supported:", err));
        }

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error('Auth error:', err);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
        const unsubSettings = onSnapshot(settingsRef, (snap) => {
          if (snap.exists()) {
            setSettings(snap.data());
          } else {
            setDoc(settingsRef, defaultSettings);
          }
        });
        const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
        const unsubRecords = onSnapshot(recordsRef, (snap) => {
          setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        const sharesRef = collection(db, 'artifacts', appId, 'public', 'data', 'shares');
        const unsubShares = onSnapshot(sharesRef, (snap) => {
          setShares(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        return () => { unsubSettings(); unsubRecords(); unsubShares(); };
      }, [user, db, appId]);

      const showMsg = (text, type = 'success') => {
        setMsg({ text, type });
        setTimeout(() => setMsg({ text: '', type: '' }), 3000);
      };

      // ==========================================
      // タブ1: 実績登録 (Record)
      // ==========================================
      const [recForm, setRecForm] = useState({
        date: new Date().toISOString().split('T')[0],
        shopId: '', staffId: ''
      });
      const [selectedItems, setSelectedItems] = useState({});
      const [otherCounts, setOtherCounts] = useState({});

      const toggleItem = (pId, item) => {
        setSelectedItems(prev => {
          const arr = prev[pId] || [];
          return { ...prev, [pId]: arr.includes(item) ? arr.filter(i => i !== item) : [...arr, item] };
        });
      };

      const handleOtherCount = (osId, item, change) => {
        setOtherCounts(prev => {
          const currentOS = prev[osId] || {};
          const currentCount = currentOS[item] || 0;
          const nextCount = Math.max(0, currentCount + change);
          return { ...prev, [osId]: { ...currentOS, [item]: nextCount } };
        });
      };

      const submitProductRecords = async () => {
        if (!recForm.shopId || !recForm.staffId) return showMsg('店舗とスタッフを選択してください', 'error');
        const productsToSubmit = Object.keys(selectedItems).filter(pId => selectedItems[pId] && selectedItems[pId].length > 0);
        if (productsToSubmit.length === 0) return showMsg('少なくとも1つの商材で項目を選択してください', 'error');
        
        try {
          const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
          const promises = productsToSubmit.map(pId => {
            return addDoc(recordsRef, {
              date: recForm.date, shopId: recForm.shopId, staffId: recForm.staffId,
              productId: pId, itemIds: selectedItems[pId], timestamp: Date.now()
            });
          });
          await Promise.all(promises);
          showMsg('商材実績を登録しました');
          setSelectedItems({}); 
        } catch (err) {
          showMsg('登録に失敗しました', 'error');
        }
      };

      const submitOtherRecords = async () => {
        if (!recForm.shopId || !recForm.staffId) return showMsg('店舗とスタッフを選択してください', 'error');
        
        const statsToSubmit = Object.keys(otherCounts).filter(osId => {
          const counts = otherCounts[osId];
          return counts && Object.values(counts).some(v => v > 0);
        });

        if (statsToSubmit.length === 0) return showMsg('件数が入力されていません', 'error');

        try {
          const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
          const promises = statsToSubmit.map(osId => {
            const filteredCounts = {};
            Object.keys(otherCounts[osId]).forEach(k => {
              if (otherCounts[osId][k] > 0) filteredCounts[k] = otherCounts[osId][k];
            });
            return addDoc(recordsRef, {
              date: recForm.date, shopId: recForm.shopId, staffId: recForm.staffId,
              otherStatId: osId, counts: filteredCounts, timestamp: Date.now()
            });
          });
          await Promise.all(promises);
          showMsg('その他実績を登録しました');
          setOtherCounts({}); 
        } catch (err) {
          showMsg('登録に失敗しました', 'error');
        }
      };

      const currentWeekRecords = useMemo(() => {
        const d = new Date();
        const day = d.getDay();
        const start = new Date(d); start.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
        const end = new Date(start); end.setDate(start.getDate() + 6);
        const startStr = start.toISOString().split('T')[0];
        const endStr = end.toISOString().split('T')[0];
        return records.filter(r => r.date >= startStr && r.date <= endStr);
      }, [records]);

      const rankings = useMemo(() => {
        const prodRankings = settings.products.map(product => {
          if (!product.rankingItem) return null;
          const productRecords = currentWeekRecords.filter(r => r.productId === product.id);
          const staffCounts = {};
          settings.staffs.forEach(s => staffCounts[s.id] = 0);
          productRecords.forEach(r => {
            if (r.itemIds?.includes(product.rankingItem) || r.itemId === product.rankingItem) {
              if (staffCounts[r.staffId] !== undefined) staffCounts[r.staffId]++;
            }
          });
          const ranking = settings.staffs
            .map(s => ({ staffName: s.name, count: staffCounts[s.id] || 0 }))
            .filter(s => s.count > 0)
            .sort((a, b) => b.count - a.count).slice(0, 3);
          return { id: 'p_' + product.id, category: product.category, name: product.name, rankingItem: product.rankingItem, ranking };
        }).filter(Boolean);

        const otherRankings = (settings.otherStats || []).map(os => {
          if (!os.rankingItem) return null;
          const osRecords = currentWeekRecords.filter(r => r.otherStatId === os.id);
          const staffCounts = {};
          settings.staffs.forEach(s => staffCounts[s.id] = 0);
          osRecords.forEach(r => {
            if (r.counts && r.counts[os.rankingItem]) {
              if (staffCounts[r.staffId] !== undefined) {
                staffCounts[r.staffId] += r.counts[os.rankingItem];
              }
            }
          });
          const ranking = settings.staffs
            .map(s => ({ staffName: s.name, count: staffCounts[s.id] || 0 }))
            .filter(s => s.count > 0)
            .sort((a, b) => b.count - a.count).slice(0, 3);
          return { id: 'o_' + os.id, category: os.mainCategory, name: os.subCategory, rankingItem: os.rankingItem, ranking };
        }).filter(Boolean);

        return [...prodRankings, ...otherRankings];
      }, [settings.products, settings.otherStats, settings.staffs, currentWeekRecords]);

      // 未完了アラート用 (登録タブトップに表示)
      const urgentShares = useMemo(() => {
        const today = new Date().toISOString().split('T')[0];
        return shares.filter(s => {
          if (s.deadline && s.deadline < today) return false;
          if (s.type === 'task') {
            const targets = s.targetStaffIds || [];
            const completed = s.completedStaffIds || [];
            if (targets.length === 0) return false;
            return completed.length < targets.length;
          } else if (s.type === 'shift') {
            const submitted = Object.keys(s.shiftRequests || {});
            const staffCount = settings.staffs.filter(st => s.targetShopId === 'all' || st.shopId === s.targetShopId).length;
            return submitted.length < staffCount;
          }
          return false;
        }).sort((a, b) => b.timestamp - a.timestamp);
      }, [shares, settings.staffs]);

      // ==========================================
      // タブ2: 実績データ (Analytics)
      // ==========================================
      const [period, setPeriod] = useState('day');
      const [baseDate, setBaseDate] = useState(new Date().toISOString().split('T')[0]);
      
      const [dataType, setDataType] = useState('product'); // 'product' or 'other'
      const [viewMode, setViewMode] = useState('table'); // 'table' or 'chart'
      
      const [analyticsCategory, setAnalyticsCategory] = useState('all');
      const [analyticsProductId, setAnalyticsProductId] = useState('all');
      
      const [analyticsOtherMainCategory, setAnalyticsOtherMainCategory] = useState('all');
      const [analyticsOtherSubCategory, setAnalyticsOtherSubCategory] = useState('all');

      const [displayMode, setDisplayMode] = useState('count');
      const [sortConfig, setSortConfig] = useState({ key: 'total', direction: 'desc' });
      const [expandedStaffId, setExpandedStaffId] = useState(null);

      useEffect(() => {
        if (settings.products.length > 0 && !analyticsProductId) setAnalyticsProductId('all');
      }, [settings.products, analyticsProductId]);

      useEffect(() => {
        setExpandedStaffId(null);
      }, [analyticsCategory, analyticsProductId, analyticsOtherMainCategory, analyticsOtherSubCategory, dataType, period, viewMode]);

      const filteredRecords = useMemo(() => {
        return records.filter(r => {
          if (period === 'day') return r.date === baseDate;
          if (period === 'week') {
            const d = new Date(baseDate), day = d.getDay();
            const start = new Date(d); start.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
            const end = new Date(start); end.setDate(start.getDate() + 6);
            return r.date >= start.toISOString().split('T')[0] && r.date <= end.toISOString().split('T')[0];
          }
          if (period === 'month') return r.date.substring(0, 7) === baseDate.substring(0, 7);
          return true;
        });
      }, [records, period, baseDate]);

      const tableData = useMemo(() => {
        if (dataType !== 'product') return null;
        let targetProducts = [];
        if (analyticsCategory === 'all') {
          targetProducts = analyticsProductId === 'all' ? settings.products : settings.products.filter(p => p.id === analyticsProductId);
        } else {
          const catProducts = settings.products.filter(p => p.category === analyticsCategory);
          targetProducts = analyticsProductId === 'all' ? catProducts : catProducts.filter(p => p.id === analyticsProductId);
        }

        if (targetProducts.length === 0) return null;
        const targetProductIds = targetProducts.map(p => p.id);
        const targetRecords = filteredRecords.filter(r => targetProductIds.includes(r.productId));

        const allItemsSet = new Set();
        targetProducts.forEach(p => p.items.forEach(item => allItemsSet.add(item)));
        const columns = Array.from(allItemsSet);

        let data = settings.staffs.map(staff => {
          const staffRecords = targetRecords.filter(r => r.staffId === staff.id);
          const total = staffRecords.length;
          
          let rankingCount = 0;
          let rankingDetails = [];
          targetProducts.forEach(p => {
            if (p.rankingItem) {
              const pRecords = staffRecords.filter(r => r.productId === p.id);
              const count = pRecords.filter(r => r.itemIds?.includes(p.rankingItem) || r.itemId === p.rankingItem).length;
              rankingCount += count;
              rankingDetails.push({ name: p.name, itemName: p.rankingItem, count });
            }
          });

          let row = { staffId: staff.id, staffName: staff.name, shopName: settings.shops.find(s => s.id === staff.shopId)?.name || '', total, rankingCount, rankingDetails };
          columns.forEach(item => {
            row[`item_${item}`] = staffRecords.filter(r => r.itemIds?.includes(item) || r.itemId === item).length;
          });
          return row;
        });

        if (sortConfig.key) {
          data.sort((a, b) => {
            if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
            if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return { columns, data };
      }, [filteredRecords, dataType, analyticsCategory, analyticsProductId, settings.staffs, settings.shops, settings.products, sortConfig]);

      const otherTableData = useMemo(() => {
        if (dataType !== 'other') return null;
        let targetStats = settings.otherStats || [];
        if (analyticsOtherMainCategory !== 'all') {
          targetStats = analyticsOtherSubCategory === 'all' ? targetStats.filter(os => os.mainCategory === analyticsOtherMainCategory) : targetStats.filter(os => os.id === analyticsOtherSubCategory);
        }

        if (targetStats.length === 0) return null;
        const targetStatIds = targetStats.map(os => os.id);
        const targetRecords = filteredRecords.filter(r => targetStatIds.includes(r.otherStatId));

        const allItemsSet = new Set();
        targetStats.forEach(os => os.items.forEach(item => allItemsSet.add(item)));
        const columns = Array.from(allItemsSet);

        let data = settings.staffs.map(staff => {
          const staffRecords = targetRecords.filter(r => r.staffId === staff.id);
          
          let rankingCount = 0;
          let rankingDetails = [];
          targetStats.forEach(os => {
            if (os.rankingItem) {
              const osRecords = staffRecords.filter(r => r.otherStatId === os.id);
              let count = 0;
              osRecords.forEach(r => {
                if (r.counts && r.counts[os.rankingItem]) count += r.counts[os.rankingItem];
              });
              rankingCount += count;
              rankingDetails.push({ name: os.subCategory, itemName: os.rankingItem, count });
            }
          });

          let row = { staffId: staff.id, staffName: staff.name, shopName: settings.shops.find(s => s.id === staff.shopId)?.name || '', total: 0, rankingCount, rankingDetails };
          columns.forEach(item => {
            let count = 0;
            staffRecords.forEach(r => { if (r.counts && r.counts[item]) count += r.counts[item]; });
            row[`item_${item}`] = count;
            row.total += count;
          });
          return row;
        });

        if (sortConfig.key) {
          data.sort((a, b) => {
            if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
            if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return { columns, data };
      }, [filteredRecords, dataType, analyticsOtherMainCategory, analyticsOtherSubCategory, settings.staffs, settings.shops, settings.otherStats, sortConfig]);

      const currentTableData = dataType === 'product' ? tableData : otherTableData;

      const requestSort = (key) => {
        let direction = 'desc';
        if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
        setSortConfig({ key, direction });
      };

      const deleteRecord = async (id) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', id));
          showMsg('実績を削除しました');
        } catch (e) {
          showMsg('削除失敗', 'error');
        }
      };

      // ==========================================
      // タブ3: 共有 (Share)
      // ==========================================
      const [isCreatingShare, setIsCreatingShare] = useState(false);
      const [shareForm, setShareForm] = useState({
        type: 'task',
        targetShopId: 'all', creatorStaffId: '', title: '', content: '', deadline: '', targetStaffIds: []
      });
      const [shiftInput, setShiftInput] = useState({ shareId: '', staffId: '', dates: '' });

      const submitShare = async () => {
        if (!shareForm.creatorStaffId || !shareForm.title) return showMsg('作成者とタイトルは必須です', 'error');
        if (shareForm.type === 'task' && shareForm.targetStaffIds.length === 0) return showMsg('後追い対象スタッフを選択してください', 'error');
        try {
          const sharesRef = collection(db, 'artifacts', appId, 'public', 'data', 'shares');
          await addDoc(sharesRef, {
            ...shareForm, timestamp: Date.now(), completedStaffIds: [], shiftRequests: {}
          });
          showMsg('共有事項を投稿しました');
          setIsCreatingShare(false);
          setShareForm({ type: 'task', targetShopId: 'all', creatorStaffId: '', title: '', content: '', deadline: '', targetStaffIds: [] });
        } catch (err) {
          showMsg('投稿に失敗しました', 'error');
        }
      };

      const toggleTaskCompletion = async (share, staffId) => {
        const completed = share.completedStaffIds || [];
        const isCompleted = completed.includes(staffId);
        const newCompleted = isCompleted ? completed.filter(id => id !== staffId) : [...completed, staffId];
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shares', share.id), { completedStaffIds: newCompleted });
        } catch (err) {
          showMsg('更新に失敗しました', 'error');
        }
      };

      const submitShift = async (shareId) => {
        if (!shiftInput.staffId || !shiftInput.dates) return showMsg('名前と希望日を入力してください', 'error');
        const share = shares.find(s => s.id === shareId);
        if (!share) return;
        try {
          const newRequests = { ...(share.shiftRequests || {}), [shiftInput.staffId]: shiftInput.dates };
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shares', shareId), { shiftRequests: newRequests });
          showMsg('希望休を提出しました');
          setShiftInput({ shareId: '', staffId: '', dates: '' });
        } catch (err) {
          showMsg('提出に失敗しました', 'error');
        }
      };

      const deleteShare = async (id) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shares', id));
          showMsg('投稿を削除しました');
        } catch (e) {
          showMsg('削除失敗', 'error');
        }
      };

      // ==========================================
      // タブ4: 設定 (Settings)
      // ==========================================
      const [isAuthenticatedSettings, setIsAuthenticatedSettings] = useState(false);
      const [inputPassword, setInputPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');

      const [newShop, setNewShop] = useState('');
      const [newStaff, setNewStaff] = useState({ shopId: '', name: '' });
      
      const [newProduct, setNewProduct] = useState({ category: '', name: '', itemsStr: '' });
      const [editingProduct, setEditingProduct] = useState(null);

      const [newOtherStat, setNewOtherStat] = useState({ mainCategory: '', subCategory: '', itemsStr: '' });
      const [editingOtherStat, setEditingOtherStat] = useState(null);

      const existingCategories = useMemo(() => Array.from(new Set(settings.products.map(p => p.category).filter(Boolean))), [settings.products]);
      const existingOtherMainCategories = useMemo(() => Array.from(new Set((settings.otherStats||[]).map(os => os.mainCategory).filter(Boolean))), [settings.otherStats]);

      const saveSettings = async (newSettingsData) => {
        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main'), newSettingsData);
          showMsg('設定を更新しました');
        } catch (err) { showMsg('更新に失敗しました', 'error'); }
      };

      const addShop = () => { if (newShop) { saveSettings({ ...settings, shops: [...settings.shops, { id: Date.now().toString(), name: newShop }] }); setNewShop(''); }};
      const addStaff = () => { if (newStaff.name && newStaff.shopId) { saveSettings({ ...settings, staffs: [...settings.staffs, { id: Date.now().toString(), ...newStaff }] }); setNewStaff({ ...newStaff, name: '' }); }};
      const addProduct = () => {
        if (newProduct.name && newProduct.itemsStr) {
          const items = newProduct.itemsStr.split(',').map(s => s.trim()).filter(s => s);
          saveSettings({ ...settings, products: [...settings.products, { id: Date.now().toString(), category: newProduct.category || '未分類', name: newProduct.name, rankingItem: items[0], items }] });
          setNewProduct({ category: '', name: '', itemsStr: '' });
        }
      };
      const saveEditedProduct = () => {
        if (editingProduct.name && editingProduct.itemsStr) {
          const items = editingProduct.itemsStr.split(',').map(s => s.trim()).filter(s => s);
          const updated = settings.products.map(p => p.id === editingProduct.id ? { ...p, category: editingProduct.category || '未分類', name: editingProduct.name, items, rankingItem: items.includes(p.rankingItem) ? p.rankingItem : (items[0] || '') } : p);
          saveSettings({ ...settings, products: updated }); setEditingProduct(null);
        }
      };

      const addOtherStat = () => {
        if (newOtherStat.mainCategory && newOtherStat.subCategory && newOtherStat.itemsStr) {

                                  <input placeholder="カテゴリー" value={editingProduct.category} onChange={e=>setEditingProduct({...editingProduct, category: e.target.value})} className={`${inputClass} py-2 px-3 text-xs bg-[#f2f2f7]`}/>
                                  <input placeholder="商材名" value={editingProduct.name} onChange={e=>setEditingProduct({...editingProduct, name: e.target.value})} className={`${inputClass} py-2 px-3 text-sm font-bold bg-[#f2f2f7]`}/>
                                  <input placeholder="項目 (カンマ区切り)" value={editingProduct.itemsStr} onChange={e=>setEditingProduct({...editingProduct, itemsStr: e.target.value})} className={`${inputClass} py-2 px-3 text-xs bg-[#f2f2f7]`}/>
                                </div>
                                <div className="flex justify-end gap-2 mt-2">
                                  <button onClick={()=>setEditingProduct(null)} className="flex items-center px-4 py-2 bg-[#f2f2f7] text-gray-600 rounded-xl font-bold text-xs"><X size={14} className="mr-1"/>キャンセル</button>
                                  <button onClick={saveEditedProduct} className="flex items-center px-4 py-2 bg-gray-900 text-white rounded-xl font-bold text-xs shadow-sm"><Save size={14} className="mr-1"/>保存</button>
                                </div>
                              </li>
                            );
                          }
                          
                          return (
                            <li key={p.id} className="p-4 rounded-2xl text-sm relative bg-[#f2f2f7]">
                              <div className="text-[10px] text-amber-500 font-bold mb-1">{p.category || '未分類'}</div>
                              <div className="font-bold text-gray-900 text-base mb-2 pr-16">{p.name}</div>
                              <div className="flex flex-wrap gap-1.5 mb-4">
                                {p.items.map(i => <span key={i} className="bg-white text-gray-600 px-2.5 py-1 rounded-lg text-xs font-semibold shadow-sm">{i}</span>)}
                              </div>
                              <div className="flex items-center text-xs bg-white p-2.5 rounded-xl">
                                <span className="text-gray-400 font-bold ml-1 w-24">ランキング集計:</span>
                                <select 
                                  value={p.rankingItem || ''} 
                                  onChange={(e) => updateRankingItem(p.id, e.target.value)}
                                  className="bg-transparent font-bold text-gray-900 focus:outline-none flex-1 py-1"
                                >
                                  <option value="">設定しない</option>
                                  {p.items.map(i => <option key={i} value={i}>{i}</option>)}
                                </select>
                              </div>
                              <div className="absolute top-4 right-3 flex gap-2 bg-white rounded-lg px-1 shadow-[0_0_10px_rgba(0,0,0,0.05)]">
                                <button onClick={() => moveItem('products', idx, 'up')} disabled={idx === 0} className="text-gray-400 hover:text-gray-900 p-1 disabled:opacity-30 active:scale-90"><ArrowUp size={16}/></button>
                                <button onClick={() => moveItem('products', idx, 'down')} disabled={idx === settings.products.length - 1} className="text-gray-400 hover:text-gray-900 p-1 disabled:opacity-30 active:scale-90"><ArrowDown size={16}/></button>
                                <button onClick={()=>setEditingProduct({ id: p.id, category: p.category || '', name: p.name, itemsStr: p.items.join(', ') })} className="text-gray-400 hover:text-gray-900 p-1"><Edit size={16}/></button>
                                <button onClick={()=>removeSetting('products', p.id)} className="text-gray-400 hover:text-red-500 p-1"><Trash2 size={16}/></button>
                              </div>
                            </li>
                          );
                        })}
                      </ul>
                    </section>

                    {/* --- その他実績管理 (件数入力) --- */}
                    <section className="bg-white p-5 rounded-3xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.05)] border border-gray-100/50">
                      <h3 className="font-semibold text-gray-900 mb-4 flex items-center">
                        <div className="w-1 h-4 bg-amber-500 rounded-full mr-2"></div>
                        その他実績管理
                        <span className="ml-2 text-[10px] bg-amber-50 text-amber-600 border border-amber-100 px-2 py-0.5 rounded-full font-bold">件数入力用</span>
                      </h3>
                      <div className="space-y-3 mb-4 bg-[#f2f2f7] p-4 rounded-2xl border border-gray-100">
                        <input 
                          list="other-category-list" placeholder="大分類 (例: 来店、物販など)" 
                          value={newOtherStat.mainCategory} onChange={e=>setNewOtherStat({...newOtherStat, mainCategory: e.target.value})} 
                          className={`${inputClass} py-2.5 text-sm bg-white`}
                        />
                        <datalist id="other-category-list">{existingOtherMainCategories.map(c => <option key={c} value={c} />)}</datalist>
                        <input placeholder="中分類 (例: 目的別)" value={newOtherStat.subCategory} onChange={e=>setNewOtherStat({...newOtherStat, subCategory: e.target.value})} className={`${inputClass} py-2.5 text-sm bg-white`}/>
                        <div className="flex gap-2">
                          <input placeholder="項目 (カンマ区切り。例: 新規,修理)" value={newOtherStat.itemsStr} onChange={e=>setNewOtherStat({...newOtherStat, itemsStr: e.target.value})} className={`${inputClass} py-2.5 text-sm bg-white`}/>
                          <button onClick={addOtherStat} className="bg-gray-900 text-white px-4 rounded-xl flex items-center justify-center active:scale-95 transition-transform"><Plus size={18}/></button>
                        </div>
                      </div>
                      
                      <ul className="space-y-3">
                        {(settings.otherStats||[]).map((os, idx) => {
                          if (editingOtherStat && editingOtherStat.id === os.id) {
                            return (
                              <li key={os.id} className="p-4 border rounded-2xl text-sm relative bg-white shadow-sm border-amber-200">
                                <div className="space-y-2.5 mb-3">
                                  <input placeholder="大分類" value={editingOtherStat.mainCategory} onChange={e=>setEditingOtherStat({...editingOtherStat, mainCategory: e.target.value})} className={`${inputClass} py-2 px-3 text-xs bg-[#f2f2f7]`}/>
                                  <input placeholder="中分類" value={editingOtherStat.subCategory} onChange={e=>setEditingOtherStat({...editingOtherStat, subCategory: e.target.value})} className={`${inputClass} py-2 px-3 text-sm font-bold bg-[#f2f2f7]`}/>
                                  <input placeholder="項目 (カンマ区切り)" value={editingOtherStat.itemsStr} onChange={e=>setEditingOtherStat({...editingOtherStat, itemsStr: e.target.value})} className={`${inputClass} py-2 px-3 text-xs bg-[#f2f2f7]`}/>
                                </div>
                                <div className="flex justify-end gap-2 mt-2">
                                  <button onClick={()=>setEditingOtherStat(null)} className="flex items-center px-4 py-2 bg-[#f2f2f7] text-gray-600 rounded-xl font-bold text-xs"><X size={14} className="mr-1"/>キャンセル</button>
                                  <button onClick={saveEditedOtherStat} className="flex items-center px-4 py-2 bg-amber-500 text-white rounded-xl font-bold text-xs shadow-sm"><Save size={14} className="mr-1"/>保存</button>
                                </div>
                              </li>
                            );
                          }
                          
                          return (
                            <li key={os.id} className="p-4 rounded-2xl text-sm relative bg-[#f2f2f7]">
                              <div className="text-[10px] text-amber-500 font-bold mb-1">{os.mainCategory}</div>
                              <div className="font-bold text-gray-900 text-base mb-2 pr-16">{os.subCategory}</div>
                              <div className="flex flex-wrap gap-1.5 mb-1">
                                {os.items.map(i => <span key={i} className="bg-white text-gray-600 px-2.5 py-1 rounded-lg text-xs font-semibold shadow-sm">{i}</span>)}
                              </div>
                              <div className="flex items-center text-xs bg-white p-2.5 rounded-xl mt-3">
                                <span className="text-gray-400 font-bold ml-1 w-24">ランキング集計:</span>
                                <select 
                                  value={os.rankingItem || ''} 
                                  onChange={(e) => updateOtherStatRankingItem(os.id, e.target.value)}
                                  className="bg-transparent font-bold text-gray-900 focus:outline-none flex-1 py-1"
                                >
                                  <option value="">設定しない</option>
                                  {os.items.map(i => <option key={i} value={i}>{i}</option>)}
                                </select>
                              </div>
                              <div className="absolute top-4 right-3 flex gap-2 bg-white rounded-lg px-1 shadow-[0_0_10px_rgba(0,0,0,0.05)]">
                                <button onClick={() => moveItem('otherStats', idx, 'up')} disabled={idx === 0} className="text-gray-400 hover:text-amber-500 p-1 disabled:opacity-30 active:scale-90"><ArrowUp size={16}/></button>
                                <button onClick={() => moveItem('otherStats', idx, 'down')} disabled={idx === (settings.otherStats||[]).length - 1} className="text-gray-400 hover:text-amber-500 p-1 disabled:opacity-30 active:scale-90"><ArrowDown size={16}/></button>
                                <button onClick={()=>setEditingOtherStat({ id: os.id, mainCategory: os.mainCategory, subCategory: os.subCategory, itemsStr: os.items.join(', ') })} className="text-gray-400 hover:text-amber-500 p-1"><Edit size={16}/></button>
                                <button onClick={()=>removeSetting('otherStats', os.id)} className="text-gray-400 hover:text-red-500 p-1"><Trash2 size={16}/></button>
                              </div>
                            </li>
                          );
                        })}
                      </ul>
                    </section>
                  </>
                )}
              </div>
            )}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-gray-200/50 pb-safe pt-2 px-2 z-40">
            <div className="max-w-md mx-auto flex justify-between px-2 pb-1">
              {[
                { id: 'record', icon: Edit, label: '登録' },
                { id: 'analytics', icon: PieChart, label: 'データ' },
                { id: 'share', icon: MessageSquare, label: '共有', badge: urgentShares.length > 0 },
                { id: 'settings', icon: SettingsIcon, label: '設定' }
              ].map(item => (
                <button
                  key={item.id}
                  onClick={() => {
                    setTab(item.id);
                    if (item.id !== 'settings') setIsAuthenticatedSettings(false);
                  }}
                  className="relative flex-1 flex flex-col items-center justify-center py-2"
                >
                  <div className={`flex flex-col items-center transition-all duration-300 ${tab === item.id ? 'text-gray-900 scale-110' : 'text-gray-400 hover:text-gray-600'}`}>
                    <item.icon size={22} className={`mb-1 ${tab === item.id ? 'stroke-[2.5px]' : 'stroke-2'}`} />
                    <span className="text-[10px] font-bold">{item.label}</span>
                  </div>
                  {item.badge && tab !== item.id && (
                    <span className="absolute top-1 right-1/4 w-2 h-2 bg-amber-500 rounded-full border-2 border-white"></span>
                  )}
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
