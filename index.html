<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>au実績管理</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    body {
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.300.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js"
      }
    }
  </script>
</head>
<body class="bg-[#f2f2f7] text-gray-900 antialiased selection:bg-amber-200">
  <div id="root"></div>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Edit, PieChart, Settings as SettingsIcon, Plus, Trash2, CheckCircle, AlertCircle, Save, X, MessageSquare, Calendar, User, Clock, BellRing, Square, CheckSquare, ArrowUp, ArrowDown, ListTodo } from 'lucide-react';
    
    import { initializeApp } from "firebase/app";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "firebase/auth";
    import { getFirestore, doc, setDoc, collection, addDoc, updateDoc, onSnapshot, deleteDoc, query, where } from "firebase/firestore";
    import { getAnalytics, isSupported } from "firebase/analytics";

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwTvFPfJjL9oTnxR8SCX_L9AZW_iT1va8_G4a4m-OqigO6tPYL8cn5EXAqxRnXduhh58w/exec';

    const getLocalDateString = (d = new Date()) => {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const getLocalMonthString = (d = new Date()) => {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      return `${year}-${month}`;
    };

    function App() {
      const [user, setUser] = useState(null);
      const [db, setDb] = useState(null);
      const [appId, setAppId] = useState('au-shop-app');
      
      const [tab, setTab] = useState('record'); 
      const [msg, setMsg] = useState({ text: '', type: '' });

      const [settings, setSettings] = useState({ shops: [], staffs: [], products: [], otherStats: [], taskTemplates: [] });
      const [records, setRecords] = useState([]);
      const [shares, setShares] = useState([]);
      const [tasks, setTasks] = useState([]);

      const [period, setPeriod] = useState('day');
      const [baseDate, setBaseDate] = useState(getLocalDateString());
      
      const [dataType, setDataType] = useState('product');

      const dataSince = useMemo(() => {
        if (tab === 'analytics') {
          const d = new Date(); d.setDate(1); d.setHours(0, 0, 0, 0); return d.getTime();
        }
        const d = new Date(); d.setDate(d.getDate() - 14); d.setHours(0, 0, 0, 0); return d.getTime();
      }, [tab]);

      const defaultSettings = { adminPassword: '0000', shops: [], staffs: [], products: [], otherStats: [], taskTemplates: [], gasUrl: GAS_URL };

      useEffect(() => {
        const id = typeof __app_id !== 'undefined' ? __app_id : 'au-shop-app';
        setAppId(id);
        
        const firebaseConfig = {
          apiKey: "AIzaSyCgcxl420NijkbRL-_XUjj9I6Teub3cAsY",
          authDomain: "au-management-3f874.firebaseapp.com",
          projectId: "au-management-3f874",
          storageBucket: "au-management-3f874.firebasestorage.app",
          messagingSenderId: "739830675936",
          appId: "1:739830675936:web:e0d04e2ff7099fc3329385",
          measurementId: "G-VPTNVG5RGP"
        };
        
        const isSandbox = typeof __firebase_config !== 'undefined' && __firebase_config;
        const config = isSandbox ? JSON.parse(__firebase_config) : firebaseConfig;

        const app = initializeApp(config);
        const auth = getAuth(app);
        const database = getFirestore(app);
        setDb(database);

        if (!isSandbox && config.measurementId) {
          isSupported().then((supported) => { if (supported) getAnalytics(app); }).catch(() => {});
        }

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
          } catch (err) { console.error('Auth error:', err); }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      const fetchRecordsFromGas = async (since) => {
        const url = settings.gasUrl || GAS_URL;
        if (!url) return;
        try {
          const res = await fetch(`${url}?action=getRecords&since=${since}`);
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          const data = await res.json();
          const normalizedData = data.map(r => {
            let dStr = r.date || '';
            if (dStr.includes('T')) dStr = getLocalDateString(new Date(dStr));
            return { ...r, date: dStr, shopId: String(r.shopId || ''), staffId: String(r.staffId || ''), productId: String(r.productId || ''), otherStatId: String(r.otherStatId || '') };
          });
          setRecords(normalizedData);
        } catch (e) { console.error("GAS fetch error:", e); }
      };

      useEffect(() => {
        if (!user || !db) return;
        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
        const unsubSettings = onSnapshot(settingsRef, (snap) => {
          if (snap.exists()) setSettings(snap.data()); else setDoc(settingsRef, defaultSettings);
        });
        const sharesRef = collection(db, 'artifacts', appId, 'public', 'data', 'shares');
        const unsubShares = onSnapshot(sharesRef, (snap) => setShares(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const tasksRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
        const unsubTasks = onSnapshot(tasksRef, (snap) => setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

        return () => { unsubSettings(); unsubShares(); unsubTasks(); };
      }, [user, db, appId]);

      useEffect(() => {
        if (!db || !settings.taskTemplates || settings.taskTemplates.length === 0) return;
        const timer = setInterval(() => {
          const now = new Date();
          const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
          const todayStr = getLocalDateString(now);
          const currentDayOfWeek = String(now.getDay());
          const currentDayOfMonth = String(now.getDate());

          settings.taskTemplates.forEach(template => {
            let shouldGenerate = false;
            if (template.time && currentTimeStr >= template.time) {
              if (template.scheduleType === 'daily') shouldGenerate = true;
              else if (template.scheduleType === 'weekly' && String(template.scheduleValue) === currentDayOfWeek) shouldGenerate = true;
              else if (template.scheduleType === 'monthly' && String(template.scheduleValue) === currentDayOfMonth) shouldGenerate = true;
            }

            if (shouldGenerate) {
              const isAll = template.isAllTarget !== undefined ? template.isAllTarget : (template.targetShopId === 'all');
              const shopIds = template.targetShopIds || (template.targetShopId && template.targetShopId !== 'all' ? [template.targetShopId] : []);

              if (isAll) {
                const taskId = `task_${template.id}_all_${todayStr}`;
                if (!tasks.some(t => t.id === taskId)) {
                   setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', taskId), { title: template.title, targetShopId: 'all', timestamp: Date.now(), templateId: template.id }).catch(()=>{});
                }
              }

              shopIds.forEach(shopId => {
                const taskId = `task_${template.id}_${shopId}_${todayStr}`;
                if (!tasks.some(t => t.id === taskId)) {
                   setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', taskId), { title: template.title, targetShopId: shopId, timestamp: Date.now(), templateId: template.id }).catch(()=>{});
                }
              });
            }
          });
        }, 60000);
        return () => clearInterval(timer);
      }, [db, appId, settings.taskTemplates, tasks]);

      useEffect(() => {
        if (!user || !db || !settings) return;
        if (settings.gasUrl) {
          fetchRecordsFromGas(dataSince);
          const timer = setInterval(() => fetchRecordsFromGas(dataSince), 15000);
          return () => clearInterval(timer);
        } else {
          const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
          const q = query(recordsRef, where("timestamp", ">=", dataSince));
          const unsubRecords = onSnapshot(q, (snap) => setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
          return () => unsubRecords();
        }
      }, [user, db, appId, dataSince, settings.gasUrl]);

      const showMsg = (text, type = 'success') => { setMsg({ text, type }); setTimeout(() => setMsg({ text: '', type: '' }), 3000); };

      const [recForm, setRecForm] = useState({ date: getLocalDateString(), shopId: '', staffId: '' });
      const [selectedItems, setSelectedItems] = useState({});
      const [otherCounts, setOtherCounts] = useState({});

      const toggleItem = (pId, item) => setSelectedItems(prev => { const arr = prev[pId] || []; return { ...prev, [pId]: arr.includes(item) ? arr.filter(i => i !== item) : [...arr, item] }; });
      const handleOtherCount = (osId, item, change) => setOtherCounts(prev => { const currentOS = prev[osId] || {}; const currentCount = currentOS[item] || 0; return { ...prev, [osId]: { ...currentOS, [item]: Math.max(0, currentCount + change) } }; });

      const submitProductRecords = async () => {
        if (!recForm.shopId || !recForm.staffId) return showMsg('店舗とスタッフを選択してください', 'error');
        const productsToSubmit = Object.keys(selectedItems).filter(pId => selectedItems[pId] && selectedItems[pId].length > 0);
        if (productsToSubmit.length === 0) return showMsg('少なくとも1つの商材で項目を選択してください', 'error');
        try {
          const shopName = (settings.shops || []).find(s => s.id === recForm.shopId)?.name || '不明';
          const staffName = (settings.staffs || []).find(s => s.id === recForm.staffId)?.name || '不明';
          const newRecords = productsToSubmit.map(pId => {
            const product = (settings.products || []).find(p => p.id === pId);
            return { id: Date.now().toString(36) + Math.random().toString(36).substring(2), date: recForm.date, shopId: recForm.shopId, staffId: recForm.staffId, productId: pId, itemIds: selectedItems[pId], timestamp: Date.now(), shopName, staffName, productName: product?.name || '不明' };
          });
          const url = settings.gasUrl || GAS_URL;
          if (url) {
            const res = await fetch(url, { method: 'POST', mode: 'cors', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'addRecords', records: newRecords }) });
            if(!res.ok) throw new Error("Network error");
            fetchRecordsFromGas(dataSince);
          } else {
            const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
            await Promise.all(newRecords.map(r => addDoc(recordsRef, r)));
          }
          showMsg('商材実績を登録しました'); setSelectedItems({}); 
        } catch (err) { showMsg('登録できませんでした。再度お試しください', 'error'); }
      };

      const submitOtherRecords = async () => {
        if (!recForm.shopId || !recForm.staffId) return showMsg('店舗とスタッフを選択してください', 'error');
        const statsToSubmit = Object.keys(otherCounts).filter(osId => otherCounts[osId] && Object.values(otherCounts[osId]).some(v => v > 0));
        if (statsToSubmit.length === 0) return showMsg('件数が入力されていません', 'error');
        try {
          const shopName = (settings.shops || []).find(s => s.id === recForm.shopId)?.name || '不明';
          const staffName = (settings.staffs || []).find(s => s.id === recForm.staffId)?.name || '不明';
          const newRecords = statsToSubmit.map(osId => {
            const otherStat = (settings.otherStats || []).find(os => os.id === osId);
            const filteredCounts = {};
            Object.keys(otherCounts[osId]).forEach(k => { if (otherCounts[osId][k] > 0) filteredCounts[k] = otherCounts[osId][k]; });
            return { id: Date.now().toString(36) + Math.random().toString(36).substring(2), date: recForm.date, shopId: recForm.shopId, staffId: recForm.staffId, otherStatId: osId, counts: filteredCounts, timestamp: Date.now(), shopName, staffName, productName: otherStat?.subCategory || '不明' };
          });
          const url = settings.gasUrl || GAS_URL;
          if (url) {
            const res = await fetch(url, { method: 'POST', mode: 'cors', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'addRecords', records: newRecords }) });
            if(!res.ok) throw new Error("Network error");
            fetchRecordsFromGas(dataSince);
          } else {
            const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'records');
            await Promise.all(newRecords.map(r => addDoc(recordsRef, r)));
          }
          showMsg('その他実績を登録しました'); setOtherCounts({}); 
        } catch (err) { showMsg('登録できませんでした。再度お試しください', 'error'); }
      };

      const currentWeekRecords = useMemo(() => {
        const d = new Date();
        const day = d.getDay();
        const start = new Date(d); start.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
        const end = new Date(start); end.setDate(start.getDate() + 6);
        
        const startStr = getLocalDateString(start);
        const endStr = getLocalDateString(end);
        
        return records.filter(r => r.date >= startStr && r.date <= endStr);
      }, [records]);

      // ★複数選択のランキング計算（項目ごとに別々のランキングとして分割）
      const rankings = useMemo(() => {
        const prodRankings = (settings.products || []).flatMap(product => {
          const rItems = Array.isArray(product.rankingItems) ? product.rankingItems : (product.rankingItem ? [product.rankingItem] : []);
          if (rItems.length === 0) return [];
          
          return rItems.map(rItem => {
            const productRecords = currentWeekRecords.filter(r => String(r.productId) === String(product.id));
            const staffCounts = {};
            (settings.staffs || []).forEach(s => staffCounts[s.id] = 0);
            
            productRecords.forEach(r => {
              if (r.itemIds) {
                if (r.itemIds.includes(rItem)) {
                  if (staffCounts[r.staffId] !== undefined) staffCounts[r.staffId]++;
                }
              } else if (r.itemId === rItem) {
                if (staffCounts[r.staffId] !== undefined) staffCounts[r.staffId]++;
              }
            });
            
            const ranking = (settings.staffs || []).map(s => ({ staffName: s.name, count: staffCounts[s.id] || 0 })).filter(s => s.count > 0).sort((a, b) => b.count - a.count).slice(0, 3);
            return { id: `p_${product.id}_${rItem}`, category: product.category, name: product.name, rankingItem: rItem, ranking };
          });
        });

        const otherRankings = (settings.otherStats || []).flatMap(os => {
          const rItems = Array.isArray(os.rankingItems) ? os.rankingItems : (os.rankingItem ? [os.rankingItem] : []);
          if (rItems.length === 0) return [];
          
          return rItems.map(rItem => {
            const osRecords = currentWeekRecords.filter(r => String(r.otherStatId) === String(os.id));
            const staffCounts = {};
            (settings.staffs || []).forEach(s => staffCounts[s.id] = 0);
            
            osRecords.forEach(r => {
              if (r.counts && r.counts[rItem]) {
                if (staffCounts[r.staffId] !== undefined) staffCounts[r.staffId] += r.counts[rItem];
              }
            });
            
            const ranking = (settings.staffs || []).map(s => ({ staffName: s.name, count: staffCounts[s.id] || 0 })).filter(s => s.count > 0).sort((a, b) => b.count - a.count).slice(0, 3);
            return { id: `o_${os.id}_${rItem}`, category: os.mainCategory, name: os.subCategory, rankingItem: rItem, ranking };
          });
        });

        return [...prodRankings, ...otherRankings];
      }, [settings.products, settings.otherStats, settings.staffs, currentWeekRecords]);

      const urgentShares = useMemo(() => {
        const today = getLocalDateString();
        return shares.filter(s => {
          if (s.deadline && s.deadline < today) return false;
          if (s.type === 'task') {
            const tStaffs = s.targetStaffIds || []; const cStaffs = s.completedStaffIds || [];
            const tShops = s.targetShopIds || []; const cShops = s.completedShopIds || [];
            return (tStaffs.length > 0 && cStaffs.length < tStaffs.length) || (tShops.length > 0 && cShops.length < tShops.length);
          } else if (s.type === 'shift') {
            const submitted = Object.keys(s.shiftRequests || {});
            const staffCount = (settings.staffs || []).filter(st => s.targetShopId === 'all' || st.shopId === s.targetShopId).length;
            return submitted.length < staffCount;
          }
          return false;
        }).sort((a, b) => b.timestamp - a.timestamp);
      }, [shares, settings.staffs]);

      const [viewMode, setViewMode] = useState('table'); 
      const [analyticsCategory, setAnalyticsCategory] = useState('all');
      const [analyticsProductId, setAnalyticsProductId] = useState('all');
      const [analyticsOtherMainCategory, setAnalyticsOtherMainCategory] = useState('all');
      const [analyticsOtherSubCategory, setAnalyticsOtherSubCategory] = useState('all');
      const [displayMode, setDisplayMode] = useState('count');
      const [sortConfig, setSortConfig] = useState({ key: 'total', direction: 'desc' });
      const [expandedStaffId, setExpandedStaffId] = useState(null);

      useEffect(() => { if ((settings.products || []).length > 0 && !analyticsProductId) setAnalyticsProductId('all'); }, [settings.products, analyticsProductId]);
      useEffect(() => { setExpandedStaffId(null); }, [analyticsCategory, analyticsProductId, analyticsOtherMainCategory, analyticsOtherSubCategory, dataType, period, viewMode]);

      const filteredRecords = useMemo(() => {
        return records.filter(r => {
          if (!r.date) return false;
          if (period === 'day') return r.date === baseDate;
          if (period === 'week') {
            const d = new Date(baseDate), day = d.getDay();
            const start = new Date(d); start.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
            const end = new Date(start); end.setDate(start.getDate() + 6);
            return r.date >= getLocalDateString(start) && r.date <= getLocalDateString(end);
          }
          if (period === 'month') return r.date.substring(0, 7) === baseDate.substring(0, 7);
          return true;
        });
      }, [records, period, baseDate]);

      const tableData = useMemo(() => {
        if (dataType !== 'product') return null;
        let targetProducts = []; const productsList = settings.products || [];
        if (analyticsCategory === 'all') targetProducts = analyticsProductId === 'all' ? productsList : productsList.filter(p => p.id === analyticsProductId);
        else {
          const catProducts = productsList.filter(p => p.category === analyticsCategory);
          targetProducts = analyticsProductId === 'all' ? catProducts : catProducts.filter(p => p.id === analyticsProductId);
        }
        if (targetProducts.length === 0) return null;
        
        const targetProductIds = targetProducts.map(p => String(p.id));
        const targetRecords = filteredRecords.filter(r => targetProductIds.includes(String(r.productId)));
        const allItemsSet = new Set(); targetProducts.forEach(p => p.items.forEach(item => allItemsSet.add(item)));
        const columns = Array.from(allItemsSet);

        let data = (settings.staffs || []).map(staff => {
          const staffRecords = targetRecords.filter(r => String(r.staffId) === String(staff.id));
          const total = staffRecords.length; let rankingCount = 0; let rankingDetails = [];
          
          targetProducts.forEach(p => {
            const rItems = Array.isArray(p.rankingItems) ? p.rankingItems : (p.rankingItem ? [p.rankingItem] : []);
            if (rItems.length > 0) {
              let count = 0;
              staffRecords.filter(r => String(r.productId) === String(p.id)).forEach(r => {
                 if(r.itemIds) { r.itemIds.forEach(id => { if(rItems.includes(id)) count++; }); }
                 else if(rItems.includes(r.itemId)) count++;
              });
              rankingCount += count;
              if (count > 0) rankingDetails.push({ name: p.name, itemName: rItems.join(', '), count });
            }
          });
          let row = { staffId: staff.id, staffName: staff.name, shopName: (settings.shops || []).find(s => s.id === staff.shopId)?.name || '', total, rankingCount, rankingDetails };
          columns.forEach(item => { row[`item_${item}`] = staffRecords.filter(r => r.itemIds?.includes(item) || r.itemId === item).length; });
          return row;
        });
        if (sortConfig.key) data.sort((a, b) => { if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1; if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1; return 0; });
        return { columns, data };
      }, [filteredRecords, dataType, analyticsCategory, analyticsProductId, settings.staffs, settings.shops, settings.products, sortConfig]);

      const otherTableData = useMemo(() => {
        if (dataType !== 'other') return null;
        let targetStats = settings.otherStats || [];
        if (analyticsOtherMainCategory !== 'all') targetStats = analyticsOtherSubCategory === 'all' ? targetStats.filter(os => os.mainCategory === analyticsOtherMainCategory) : targetStats.filter(os => os.id === analyticsOtherSubCategory);
        if (targetStats.length === 0) return null;
        
        const targetStatIds = targetStats.map(os => String(os.id));
        const targetRecords = filteredRecords.filter(r => targetStatIds.includes(String(r.otherStatId)));
        const allItemsSet = new Set(); targetStats.forEach(os => os.items.forEach(item => allItemsSet.add(item)));
        const columns = Array.from(allItemsSet);

        let data = (settings.staffs || []).map(staff => {
          const staffRecords = targetRecords.filter(r => String(r.staffId) === String(staff.id));
          let rankingCount = 0; let rankingDetails = [];
          targetStats.forEach(os => {
            const rItems = Array.isArray(os.rankingItems) ? os.rankingItems : (os.rankingItem ? [os.rankingItem] : []);
            if (rItems.length > 0) {
              const osRecords = staffRecords.filter(r => String(r.otherStatId) === String(os.id));
              let count = 0; 
              osRecords.forEach(r => { if (r.counts) { rItems.forEach(ri => { if(r.counts[ri]) count += r.counts[ri]; }); } });
              rankingCount += count;
              if (count > 0) rankingDetails.push({ name: os.subCategory, itemName: rItems.join(', '), count });
            }
          });
          let row = { staffId: staff.id, staffName: staff.name, shopName: (settings.shops || []).find(s => s.id === staff.shopId)?.name || '', total: 0, rankingCount, rankingDetails };
          columns.forEach(item => { let count = 0; staffRecords.forEach(r => { if (r.counts && r.counts[item]) count += r.counts[item]; }); row[`item_${item}`] = count; row.total += count; });
          return row;
        });
        if (sortConfig.key) data.sort((a, b) => { if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1; if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1; return 0; });
        return { columns, data };
      }, [filteredRecords, dataType, analyticsOtherMainCategory, analyticsOtherSubCategory, settings.staffs, settings.shops, settings.otherStats, sortConfig]);

      const currentTableData = dataType === 'product' ? tableData : otherTableData;

                                    return (
                                      <label key={`rank_${i}`} className="flex items-center space-x-1.5 bg-gray-50 px-2 py-1 rounded border border-gray-200 cursor-pointer active:scale-95 transition-transform">
                                        <input type="checkbox" checked={isSelected} onChange={() => toggleRankingItem(p.id, i)} className="rounded text-gray-900 focus:ring-gray-900 border-gray-300" />
                                        <span className={`font-medium ${isSelected ? 'text-gray-900' : 'text-gray-500'}`}>{i}</span>
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                              <div className="flex flex-col text-xs bg-white p-2.5 rounded-xl mt-1">
                                <span className="text-gray-400 font-bold ml-1 mb-1">個人目標集計 (複数選択可):</span>
                                <div className="flex flex-wrap gap-1.5 px-1">
                                  {p.items.map(i => {
                                    const currentItems = Array.isArray(p.goalItems) ? p.goalItems : (p.goalItem ? [p.goalItem] : []);
                                    const isSelected = currentItems.includes(i);
                                    return (
                                      <label key={`goal_${i}`} className="flex items-center space-x-1.5 bg-gray-50 px-2 py-1 rounded border border-gray-200 cursor-pointer active:scale-95 transition-transform">
                                        <input type="checkbox" checked={isSelected} onChange={() => toggleGoalItem(p.id, i)} className="rounded text-amber-500 focus:ring-amber-500 border-gray-300" />
                                        <span className={`font-medium ${isSelected ? 'text-gray-900' : 'text-gray-500'}`}>{i}</span>
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                              <div className="absolute top-4 right-3 flex gap-2 bg-white rounded-lg px-1 shadow-[0_0_10px_rgba(0,0,0,0.05)]">
                                <button onClick={() => moveItem('products', idx, 'up')} disabled={idx === 0} className="text-gray-400 hover:text-gray-900 p-1 disabled:opacity-30 active:scale-90"><ArrowUp size={16}/></button>
                                <button onClick={() => moveItem('products', idx, 'down')} disabled={idx === (settings.products || []).length - 1} className="text-gray-400 hover:text-gray-900 p-1 disabled:opacity-30 active:scale-90"><ArrowDown size={16}/></button>
                                <button onClick={()=>setEditingProduct({ id: p.id, category: p.category || '', name: p.name, itemsStr: p.items.join(', ') })} className="text-gray-400 hover:text-gray-900 p-1"><Edit size={16}/></button>
                                <button onClick={()=>removeSetting('products', p.id)} className="text-gray-400 hover:text-red-500 p-1"><Trash2 size={16}/></button>
                              </div>
                            </li>
                          );
                        })}
                      </ul>
                    </section>

                    {/* --- その他実績管理 (件数入力) --- */}
                    <section className="bg-white p-5 rounded-3xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.05)] border border-gray-100/50">
                      <h3 className="font-semibold text-gray-900 mb-4 flex items-center">
                        <div className="w-1 h-4 bg-amber-500 rounded-full mr-2"></div>
                        その他実績管理
                        <span className="ml-2 text-[10px] bg-amber-50 text-amber-600 border border-amber-100 px-2 py-0.5 rounded-full font-bold">件数入力用</span>
                      </h3>
                      <div className="space-y-3 mb-4 bg-[#f2f2f7] p-4 rounded-2xl border border-gray-100">
                        <input list="other-category-list" placeholder="大分類 (例: 来店、物販など)" value={newOtherStat.mainCategory} onChange={e=>setNewOtherStat({...newOtherStat, mainCategory: e.target.value})} className={`${inputClass} py-2.5 text-sm bg-white`} />
                        <datalist id="other-category-list">{existingOtherMainCategories.map(c => <option key={c} value={c} />)}</datalist>
                        <input placeholder="中分類 (例: 目的別)" value={newOtherStat.subCategory} onChange={e=>setNewOtherStat({...newOtherStat, subCategory: e.target.value})} className={`${inputClass} py-2.5 text-sm bg-white`}/>
                        <div className="flex gap-2">
                          <input placeholder="項目 (カンマ区切り。例: 新規,修理)" value={newOtherStat.itemsStr} onChange={e=>setNewOtherStat({...newOtherStat, itemsStr: e.target.value})} className={`${inputClass} py-2.5 text-sm bg-white`}/>
                          <button onClick={addOtherStat} className="bg-gray-900 text-white px-4 rounded-xl flex items-center justify-center active:scale-95 transition-transform"><Plus size={18}/></button>
                        </div>
                      </div>
                      
                      <ul className="space-y-3">
                        {(settings.otherStats||[]).map((os, idx) => {
                          if (editingOtherStat && editingOtherStat.id === os.id) {
                            return (
                              <li key={os.id} className="p-4 border rounded-2xl text-sm relative bg-white shadow-sm border-amber-200">
                                <div className="space-y-2.5 mb-3">
                                  <input placeholder="大分類" value={editingOtherStat.mainCategory} onChange={e=>setEditingOtherStat({...editingOtherStat, mainCategory: e.target.value})} className={`${inputClass} py-2 px-3 text-xs bg-[#f2f2f7]`}/>
                                  <input placeholder="中分類" value={editingOtherStat.subCategory} onChange={e=>setEditingOtherStat({...editingOtherStat, subCategory: e.target.value})} className={`${inputClass} py-2 px-3 text-sm font-bold bg-[#f2f2f7]`}/>
                                  <input placeholder="項目 (カンマ区切り)" value={editingOtherStat.itemsStr} onChange={e=>setEditingOtherStat({...editingOtherStat, itemsStr: e.target.value})} className={`${inputClass} py-2 px-3 text-xs bg-[#f2f2f7]`}/>
                                </div>
                                <div className="flex justify-end gap-2 mt-2">
                                  <button onClick={()=>setEditingOtherStat(null)} className="flex items-center px-4 py-2 bg-[#f2f2f7] text-gray-600 rounded-xl font-bold text-xs"><X size={14} className="mr-1"/>キャンセル</button>
                                  <button onClick={saveEditedOtherStat} className="flex items-center px-4 py-2 bg-amber-500 text-white rounded-xl font-bold text-xs shadow-sm"><Save size={14} className="mr-1"/>保存</button>
                                </div>
                              </li>
                            );
                          }
                          
                          return (
                            <li key={os.id} className="p-4 rounded-2xl text-sm relative bg-[#f2f2f7]">
                              <div className="text-[10px] text-amber-500 font-bold mb-1">{os.mainCategory}</div>
                              <div className="font-bold text-gray-900 text-base mb-2 pr-16">{os.subCategory}</div>
                              <div className="flex flex-wrap gap-1.5 mb-1">
                                {os.items.map(i => <span key={i} className="bg-white text-gray-600 px-2.5 py-1 rounded-lg text-xs font-semibold shadow-sm">{i}</span>)}
                              </div>
                              <div className="flex flex-col text-xs bg-white p-2.5 rounded-xl mt-3">
                                <span className="text-gray-400 font-bold ml-1 mb-1">ランキング集計 (複数選択可):</span>
                                <div className="flex flex-wrap gap-1.5 px-1">
                                  {os.items.map(i => {
                                    const currentItems = Array.isArray(os.rankingItems) ? os.rankingItems : (os.rankingItem ? [os.rankingItem] : []);
                                    const isSelected = currentItems.includes(i);
                                    return (
                                      <label key={`os_rank_${i}`} className="flex items-center space-x-1.5 bg-gray-50 px-2 py-1 rounded border border-gray-200 cursor-pointer active:scale-95 transition-transform">
                                        <input type="checkbox" checked={isSelected} onChange={() => toggleOtherStatRankingItem(os.id, i)} className="rounded text-gray-900 focus:ring-gray-900 border-gray-300" />
                                        <span className={`font-medium ${isSelected ? 'text-gray-900' : 'text-gray-500'}`}>{i}</span>
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                              <div className="flex flex-col text-xs bg-white p-2.5 rounded-xl mt-1">
                                <span className="text-gray-400 font-bold ml-1 mb-1">個人目標集計 (複数選択可):</span>
                                <div className="flex flex-wrap gap-1.5 px-1">
                                  {os.items.map(i => {
                                    const currentItems = Array.isArray(os.goalItems) ? os.goalItems : (os.goalItem ? [os.goalItem] : []);
                                    const isSelected = currentItems.includes(i);
                                    return (
                                      <label key={i} className="flex items-center space-x-1.5 bg-gray-50 px-2 py-1 rounded border border-gray-200 cursor-pointer active:scale-95 transition-transform">
                                        <input type="checkbox" checked={isSelected} onChange={() => toggleOtherStatGoalItem(os.id, i)} className="rounded text-amber-500 focus:ring-amber-500 border-gray-300" />
                                        <span className={`font-medium ${isSelected ? 'text-gray-900' : 'text-gray-500'}`}>{i}</span>
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                              <div className="absolute top-4 right-3 flex gap-2 bg-white rounded-lg px-1 shadow-[0_0_10px_rgba(0,0,0,0.05)]">
                                <button onClick={() => moveItem('otherStats', idx, 'up')} disabled={idx === 0} className="text-gray-400 hover:text-amber-500 p-1 disabled:opacity-30 active:scale-90"><ArrowUp size={16}/></button>
                                <button onClick={() => moveItem('otherStats', idx, 'down')} disabled={idx === (settings.otherStats||[]).length - 1} className="text-gray-400 hover:text-amber-500 p-1 disabled:opacity-30 active:scale-90"><ArrowDown size={16}/></button>
                                <button onClick={()=>setEditingOtherStat({ id: os.id, mainCategory: os.mainCategory, subCategory: os.subCategory, itemsStr: os.items.join(', ') })} className="text-gray-400 hover:text-amber-500 p-1"><Edit size={16}/></button>
                                <button onClick={()=>removeSetting('otherStats', os.id)} className="text-gray-400 hover:text-red-500 p-1"><Trash2 size={16}/></button>
                              </div>
                            </li>
                          );
                        })}
                      </ul>
                    </section>
                  </>
                )}
              </div>
            )}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-gray-200/50 pb-safe pt-2 px-2 z-40">
            <div className="max-w-md mx-auto flex justify-between px-2 pb-1">
              {[
                { id: 'record', icon: Edit, label: '登録' },
                { id: 'task', icon: ListTodo, label: '作業', badge: tasks.length > 0 },
                { id: 'analytics', icon: PieChart, label: 'データ' },
                { id: 'share', icon: MessageSquare, label: '共有', badge: urgentShares.length > 0 },
                { id: 'settings', icon: SettingsIcon, label: '設定' }
              ].map(item => (
                <button
                  key={item.id}
                  onClick={() => {
                    setTab(item.id);
                    if (item.id !== 'settings') setIsAuthenticatedSettings(false);
                  }}
                  className="relative flex-1 flex flex-col items-center justify-center py-2"
                >
                  <div className={`flex flex-col items-center transition-all duration-300 ${tab === item.id ? 'text-gray-900 scale-110' : 'text-gray-400 hover:text-gray-600'}`}>
                    <item.icon size={22} className={`mb-1 ${tab === item.id ? 'stroke-[2.5px]' : 'stroke-2'}`} />
                    <span className="text-[10px] font-bold">{item.label}</span>
                  </div>
                  {item.badge && tab !== item.id && (
                    <span className="absolute top-1 right-1/4 w-2 h-2 bg-amber-500 rounded-full border-2 border-white"></span>
                  )}
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
